<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e4dcc2;
            color: rgb(48, 48, 48);
            margin: 0;
            padding: 20px;
        }

        #mainImageBox img {
            width: 100%;
            max-width: 700px;
            display: block;
            margin: 0 auto 20px auto;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #imageDetails {
            text-align: center;
            margin-bottom: 30px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            cursor: pointer;
            overflow: hidden;
            border-radius: 10px;
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.4s;
            display: block;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="section">
        <h2 style="text-align:center;">Gallery Details</h2>

        <!-- Main Image -->
        <div id="mainImageBox"></div>

        <!-- Info -->
        <div id="imageDetails"></div>

        <!-- Related Images -->
        <h3>Related Photos</h3>
        <div id="relatedGallery" class="gallery-grid"></div>
    </div>

    <script>

        let allImages = [];
        let currentIndex = 0;



        async function loadGalleryDetails() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const category = params.get('category');

            const mainBox = document.getElementById('mainImageBox');
            const detailBox = document.getElementById('imageDetails');
            const relatedBox = document.getElementById('relatedGallery');

            try {
                const res = await fetch(`/api/gallery?category=${category}`);
                const r = await res.json();

                if (!r.success || !r.data.length) {
                    mainBox.innerHTML = "<p>No images found.</p>";
                    return;
                }

                const current = r.data.find(img => img.id == id);

                if (!current) {
                    mainBox.innerHTML = "<p>Image not found.</p>";
                    return;
                }

                // MAIN IMAGE
                mainBox.innerHTML = `<img src="${current.imageUrl}" alt="${current.titleEn}">`;

                // DETAILS
                detailBox.innerHTML = `
          <h3>${current.titleMr}</h3>
          <p>${current.titleEn}</p>
          <p><b>Category:</b> ${current.category}</p>
          <p><b>Uploaded By:</b> ${current.User?.fullName || 'Admin'}</p>
        `;

                // RELATED IMAGES
                relatedBox.innerHTML = r.data
                    .filter(img => img.id != id)
                    .map(img => `
            <div class="gallery-item" data-id="${img.id}" data-category="${img.category}">
              <img src="${img.imageUrl}" alt="${img.titleEn}">
            </div>
          `).join('');

                // ADD CLICK EVENT TO RELATED IMAGES
                relatedBox.querySelectorAll('.gallery-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const imgId = item.getAttribute('data-id');
                        const imgCategory = item.getAttribute('data-category');
                        openGallery(imgId, imgCategory);
                    });
                });

            } catch (err) {
                console.error(err);
                mainBox.innerHTML = "<p>Error loading gallery.</p>";
            }
        }






        function openGallery(id, category) {
            window.location.href = `gallery.html?id=${id}&category=${category}`;
        }




        loadGalleryDetails();

    </script>
</body>

</html>
